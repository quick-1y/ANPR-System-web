settings_version: 1
settings_lineage: mainline
models:
  yolo_model_path: anpr/models/yolo/best.pt
  ocr_model_path: anpr/models/ocr_crnn/crnn_ocr_model_int8_fx.pth
  device: cpu
ocr:
  img_height: 32
  img_width: 128
  alphabet: 0123456789ABCEHKMOPTXY
  confidence_threshold: 0.6
detector:
  confidence_threshold: 0.5
  bbox_padding_ratio: 0.08
  min_padding_pixels: 2
inference:
  workers: 2
  shared_memory: true
debug:
  show_channel_metrics: true
  log_panel_enabled: true
  disable_video_output: false
grid: 2x2
theme: dark
channels:
- id: 1
  name: Въезд
  source: rtsp://admin:admin@195.239.135.49:2002/0
  enabled: true
  roi_enabled: true
  region:
    unit: percent
    points:
    - x: 0.0
      y: 0.0
    - x: 100.0
      y: 0.0
    - x: 100.0
      y: 100.0
    - x: 0.0
      y: 100.0
  best_shots: 10
  cooldown_seconds: 10
  ocr_min_confidence: 0.6
  direction:
    history_size: 12
    min_track_length: 3
    smoothing_window: 5
    confidence_threshold: 0.55
    jitter_pixels: 1.0
    min_area_change_ratio: 0.02
  detection_mode: motion
  detector_frame_stride: 2
  motion_threshold: 0.01
  motion_frame_stride: 1
  motion_activation_frames: 3
  motion_release_frames: 100
  size_filter_enabled: true
  min_plate_size:
    width: 102
    height: 27
  max_plate_size:
    width: 232
    height: 59
  controller_id: null
  controller_relay: 0
  list_filter_mode: all
  list_filter_list_ids: []
  max_ocr_attempts: 15
- id: 2
  name: Выезд
  source: rtsp://admin:admin@78.138.142.26:2001/0
  enabled: true
  roi_enabled: true
  region:
    unit: percent
    points:
    - x: 1.235
      y: 31.298
    - x: 49.27
      y: 16.247
    - x: 99.27
      y: 20.434
    - x: 100.0
      y: 100.0
    - x: 0.0
      y: 100.0
  best_shots: 3
  cooldown_seconds: 5
  ocr_min_confidence: 0.6
  direction:
    history_size: 12
    min_track_length: 3
    smoothing_window: 5
    confidence_threshold: 0.55
    jitter_pixels: 1.0
    min_area_change_ratio: 0.02
  detection_mode: motion
  detector_frame_stride: 2
  motion_threshold: 0.01
  motion_frame_stride: 1
  motion_activation_frames: 3
  motion_release_frames: 100
  size_filter_enabled: true
  min_plate_size:
    width: 80
    height: 20
  max_plate_size:
    width: 447
    height: 145
  controller_id: null
  controller_relay: 0
  list_filter_mode: all
  list_filter_list_ids: []
  max_ocr_attempts: 15
controllers:
- id: 1
  name: Общий контроллер
  type: DTWONDER2CH
  address: 192.168.1.100
  password: '0'
  relays:
  - mode: pulse
    timer_seconds: 1
    hotkey: '3'
  - mode: pulse
    timer_seconds: 1
    hotkey: ''
reconnect:
  signal_loss:
    enabled: true
    frame_timeout_seconds: 5
    retry_interval_seconds: 5
  periodic:
    enabled: true
    interval_minutes: 60
storage:
  screenshots_dir: data/screenshots
  logs_dir: logs
  auto_cleanup_enabled: true
  cleanup_interval_minutes: 30
  events_retention_days: 30
  media_retention_days: 14
  max_screenshots_mb: 4096
  export_dir: data/exports
tracking:
  best_shots: 3
  cooldown_seconds: 5
  ocr_min_confidence: 0.6
  max_ocr_attempts: 15
  direction:
    history_size: 12
    min_track_length: 3
    smoothing_window: 5
    confidence_threshold: 0.55
    jitter_pixels: 1.0
    min_area_change_ratio: 0.02
plates:
  config_dir: anpr/countries
  enabled_countries: []
logging:
  level: INFO
  retention_days: 30
  allowed_levels:
  - ALL
  - DEBUG
  - INFO
  - WARNING
  - ERROR
  - CRITICAL
time:
  timezone: UTC+00:00
  offset_minutes: 0
