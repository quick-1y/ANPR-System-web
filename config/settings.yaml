models:
  yolo_model_path: anpr/models/yolo/best.pt
  ocr_model_path: anpr/models/ocr_crnn/crnn_ocr_model_int8_fx.pth
  device: cpu
debug:
  show_channel_metrics: true
  log_panel_enabled: true
  disable_video_output: false
reconnect:
  signal_loss:
    enabled: true
    frame_timeout_seconds: 5
    retry_interval_seconds: 5
  periodic:
    enabled: true
    interval_minutes: 60
storage:
  screenshots_dir: data/screenshots
  logs_dir: logs
  auto_cleanup_enabled: true
  cleanup_interval_minutes: 30
  events_retention_days: 30
  media_retention_days: 14
  max_screenshots_mb: 4096
plates:
  enabled_countries:
  - BY
  - KZ
  - RU
interface:
  style: graphite-minimal
  theme: light
  sidebar_locked: false
logging:
  level: ALL
  retention_days: 30
time:
  timezone: UTC+00:00
