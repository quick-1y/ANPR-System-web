services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anpr}
      POSTGRES_USER: ${POSTGRES_USER:-anpr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anpr} -d ${POSTGRES_DB:-anpr}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SETTINGS_PATH: ${SETTINGS_PATH:-/app/config/settings.yaml}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-docker}
      DEBUG: ${DEBUG:-false}
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8080
    expose:
      - "8080"
    volumes:
      - ./config:/app/config
      - media_data:/app/data
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  retention_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SETTINGS_PATH: ${SETTINGS_PATH:-/app/config/settings.yaml}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-docker}
      DEBUG: ${DEBUG:-false}
    command: uvicorn apps.worker.main:app --host 0.0.0.0 --port 8092
    expose:
      - "8092"
    volumes:
      - ./config:/app/config
      - media_data:/app/data
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/worker/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
      retention_worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

volumes:
  pgdata:
  media_data:
  logs_data:
